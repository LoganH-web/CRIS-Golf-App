# Codemagic CI — build the Capacitor iOS app in the cloud and ship to TestFlight.
# No Mac required on your side: Codemagic runs this on a hosted Mac.
#
# ONE-TIME SETUP (in the Codemagic UI) — see TESTFLIGHT.md for details:
#   1. Connect this Git repo to a new Codemagic app.
#   2. Add an App Store Connect API key integration named exactly "Codemagic CI"
#      (Teams → Integrations → App Store Connect). This handles signing + upload.
#   3. Create the app record in App Store Connect (bundle id th.ac.cris.golf),
#      then put its numeric Apple ID into APP_STORE_APP_ID below.
#
# Trigger a build manually from the Codemagic dashboard (or on push to main).

workflows:
  ios-testflight:
    name: CRIS Golf — iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic CI         # must match the integration name in Codemagic exactly
    environment:
      # NOTE: no `ios_signing:` block here on purpose. That block only *fetches*
      # an existing provisioning profile during machine setup, which fails for a
      # brand-new app ("No matching profiles found"). Instead the signing script
      # below fetches **or creates** the certificate + profile via the API key.
      groups:
        # Provides CERTIFICATE_PRIVATE_KEY — a persistent RSA private key added
        # as a secure variable in the Codemagic UI (group "signing"). Without it,
        # each build's --create makes a throwaway certificate whose private key
        # dies with the build machine; the next build then downloads only the
        # public cert and fails with "Cannot save Signing Certificates without
        # certificate private key". Tying the cert to this fixed key makes it
        # reusable across builds.
        - signing
      vars:
        BUNDLE_ID: "th.ac.cris.golf"
        APP_STORE_APP_ID: 6793028047           # numeric Apple ID of the App Store Connect record
        XCODE_SCHEME: "App"
      node: 22          # Capacitor 8 CLI requires Node >= 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install JS dependencies
        script: npm ci
      - name: Build web (Next.js static export → out/)
        script: npm run build
      - name: Add iOS platform (native project is not committed)
        script: npx cap add ios
      - name: Generate app icon + launch images
        script: npx capacitor-assets generate --ios
      - name: Sync web assets into the iOS project
        script: npx cap sync ios
      - name: Set up code signing (creates cert + profile if missing)
        script: |
          set -e
          keychain initialize
          # --certificate-key ties the distribution certificate to a persistent
          # private key (secure var, group "signing"), so the same cert is reused
          # every build instead of being orphaned. On the first run with this key
          # --create mints a new cert from it; later runs just download+reuse it.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          # Apply the fetched profile to the App target. Point --project at the
          # Capacitor project explicitly so it can't miss it, and print what it
          # did — if this reports 0 profiles applied, the archive will fail with
          # "requires a provisioning profile", so we want that visible here.
          echo "--- Provisioning profiles on disk ---"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles" || true
          xcode-project use-profiles --project "ios/App/App.xcodeproj"
      - name: Set build number (latest TestFlight build + 1)
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0)
          cd ios/App
          agvtool new-version -all $((LATEST + 1))
      - name: Build .ipa
        script: |
          set -e
          echo "--- iOS project layout ---"
          ls -la ios/App || true
          # Capacitor 8 generates an SPM-based project (no CocoaPods), so there
          # is NO real .xcworkspace — only App.xcodeproj. Note that every
          # .xcodeproj bundle contains an *internal* project.xcworkspace; that is
          # NOT a build workspace and must not be archived (doing so ignores the
          # manual-signing settings use-profiles wrote to the .xcodeproj, which
          # is exactly what caused the "requires a provisioning profile" failure).
          # So: look for a real, top-level workspace only (maxdepth 2, and never
          # one living inside a .xcodeproj). Otherwise build the project directly.
          WS=$(find ios -maxdepth 2 -name "*.xcworkspace" -not -path "*.xcodeproj/*" | head -1)
          PROJ=$(find ios -maxdepth 2 -name "*.xcodeproj" | head -1)
          if [ -n "$WS" ]; then
            echo "Building real workspace: $WS"
            xcode-project build-ipa --workspace "$WS" --scheme "$XCODE_SCHEME"
          elif [ -n "$PROJ" ]; then
            echo "Building project directly: $PROJ"
            xcode-project build-ipa --project "$PROJ" --scheme "$XCODE_SCHEME"
          else
            echo "ERROR: no .xcworkspace or .xcodeproj found under ios/"
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Internal testers get the build automatically (no review). To auto-add
        # external tester groups, list them here (requires Beta App Review):
        # beta_groups:
        #   - "School Testers"
