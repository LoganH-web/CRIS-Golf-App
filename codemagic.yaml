# Codemagic CI — build the Capacitor iOS app in the cloud and ship to TestFlight.
# No Mac required on your side: Codemagic runs this on a hosted Mac.
#
# ONE-TIME SETUP (in the Codemagic UI) — see TESTFLIGHT.md for details:
#   1. Connect this Git repo to a new Codemagic app.
#   2. Add an App Store Connect API key integration named exactly "Codemagic CI"
#      (Teams → Integrations → App Store Connect). This handles signing + upload.
#   3. Create the app record in App Store Connect (bundle id th.ac.cris.golf),
#      then put its numeric Apple ID into APP_STORE_APP_ID below.
#
# Trigger a build manually from the Codemagic dashboard (or on push to main).

workflows:
  ios-testflight:
    name: CRIS Golf — iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic CI         # must match the integration name in Codemagic exactly
    environment:
      # NOTE: no `ios_signing:` block here on purpose. That block only *fetches*
      # an existing provisioning profile during machine setup, which fails for a
      # brand-new app ("No matching profiles found"). Instead the signing script
      # below fetches **or creates** the certificate + profile via the API key.
      vars:
        BUNDLE_ID: "th.ac.cris.golf"
        APP_STORE_APP_ID: 6793028047           # numeric Apple ID of the App Store Connect record
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22          # Capacitor 8 CLI requires Node >= 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install JS dependencies
        script: npm ci
      - name: Build web (Next.js static export → out/)
        script: npm run build
      - name: Add iOS platform (native project is not committed)
        script: npx cap add ios
      - name: Generate app icon + launch images
        script: npx capacitor-assets generate --ios
      - name: Sync web assets into the iOS project
        script: npx cap sync ios
      - name: Set up code signing (creates cert + profile if missing)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Set build number (latest TestFlight build + 1)
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0)
          cd ios/App
          agvtool new-version -all $((LATEST + 1))
      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Internal testers get the build automatically (no review). To auto-add
        # external tester groups, list them here (requires Beta App Review):
        # beta_groups:
        #   - "School Testers"
